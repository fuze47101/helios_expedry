<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solaris FZ-500</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #151922;
    --border: #2a303d;
    --text: #e6e9ef;
    --muted: #9aa4b7;
    --accent: #ff7043;
    --ok: #4caf50;
    --warn: #ffb300;
    --err: #ef5350;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Segoe UI, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 0.02em; }
  header h1 span { color: var(--accent); }
  .status { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.err { background: var(--err); }

  main { display: grid; grid-template-columns: 1fr 320px; gap: 12px; padding: 12px; overflow: hidden; }

  .chart-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; min-height: 0; }
  .readouts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .readout {
    background: #0e1218; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; text-align: center;
  }
  .readout .label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .readout .value { font-size: 32px; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .readout .unit { font-size: 14px; color: var(--muted); margin-left: 2px; }
  #chart { flex: 1; min-height: 0; }

  .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .card h2 { margin: 0 0 10px 0; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }

  .lamp { display: flex; align-items: center; gap: 12px; }
  .lamp-ind { width: 48px; height: 48px; border-radius: 50%; background: #222; border: 2px solid var(--border); transition: all 0.2s; }
  .lamp-ind.on { background: var(--accent); box-shadow: 0 0 30px var(--accent); border-color: var(--accent); }
  .lamp-meta { flex: 1; }
  .lamp-state { font-size: 20px; font-weight: 600; }
  .lamp-time { font-size: 12px; color: var(--muted); }

  .btn {
    display: block; width: 100%; padding: 14px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 10px; letter-spacing: 0.04em;
  }
  .btn.sec { background: #2a303d; }
  .btn.stop { background: var(--err); }
  .btn:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .config { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .config label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .config input {
    width: 100%; background: #0e1218; border: 1px solid var(--border);
    color: var(--text); padding: 8px; border-radius: 4px; font-size: 14px;
  }
  .id-block { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; margin-bottom: 4px; }
  .id-block label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .id-block input {
    width: 100%; background: #0e1218; border: 1px solid var(--border);
    color: var(--text); padding: 9px 10px; border-radius: 4px; font-size: 14px;
  }
  .id-block input:focus { outline: none; border-color: var(--accent); }

  .test-status { margin-top: 10px; font-size: 13px; }
  .test-phase { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; background: var(--border); text-transform: uppercase; letter-spacing: 0.1em; }
  .test-phase.warmup { background: #37474f; }
  .test-phase.lamp_on { background: var(--accent); color: #fff; }
  .test-phase.cooldown { background: #455a64; }
  .test-phase.done { background: var(--ok); color: #fff; }

  .wifi-list { display: flex; flex-direction: column; gap: 6px; }
  .wifi-btn {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: #0e1218; border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer; color: var(--text); font-size: 14px;
  }
  .wifi-btn.active { border-color: var(--ok); background: #12231a; }
  .wifi-btn:hover { background: #1a1f28; }
  .wifi-badge { font-size: 10px; background: var(--ok); color: #fff; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }

  footer { padding: 8px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>SOLARIS <span>FZ-500</span></h1>
    <div class="status">
      <span id="st-spi"><span class="dot warn"></span>SPI</span>
      <span id="st-ds"><span class="dot warn"></span>DS18B20</span>
      <span id="st-lamp"><span class="dot warn"></span>Lamp</span>
      <span id="st-wifi"></span>
    </div>
  </header>

  <main>
    <div class="chart-wrap">
      <div class="readouts">
        <div class="readout"><div class="label">TC-A (plate)</div><div class="value"><span id="r-tca">--</span><span class="unit">°C</span></div></div>
        <div class="readout"><div class="label">TC-B (plate)</div><div class="value"><span id="r-tcb">--</span><span class="unit">°C</span></div></div>
        <div class="readout"><div class="label">Air gap</div><div class="value"><span id="r-air">--</span><span class="unit">°C</span></div></div>
      </div>
      <div id="chart"></div>
    </div>

    <div class="sidebar">
      <div class="card">
        <h2>IR Lamp</h2>
        <div class="lamp">
          <div id="lamp-ind" class="lamp-ind"></div>
          <div class="lamp-meta">
            <div class="lamp-state" id="lamp-state">OFF</div>
            <div class="lamp-time" id="lamp-time">—</div>
          </div>
        </div>
        <button class="btn sec" id="lamp-toggle">Manual ON</button>
      </div>

      <div class="card">
        <h2>Test Sequence</h2>
        <div class="id-block">
          <label for="cfg-sample">Sample ID</label>
          <input type="text" id="cfg-sample" placeholder="e.g. dryrun_01, NK-A3, bare_plate" maxlength="40" autocomplete="off">
          <label for="cfg-testname">Test Name (optional)</label>
          <input type="text" id="cfg-testname" placeholder="e.g. nike_demo, 5min_300w" maxlength="40" autocomplete="off">
        </div>
        <div class="config">
          <div>
            <label>Warmup (s)</label>
            <input type="number" id="cfg-warmup" value="30" min="0" max="600">
          </div>
          <div>
            <label>Lamp on (s)</label>
            <input type="number" id="cfg-lamp" value="300" min="10" max="1800">
          </div>
          <div>
            <label>Cooldown (s)</label>
            <input type="number" id="cfg-cool" value="60" min="0" max="600">
          </div>
        </div>
        <button class="btn" id="test-start">Start Test</button>
        <button class="btn stop" id="test-stop" disabled>Stop Test</button>
        <div class="test-status" id="test-status">
          <span class="test-phase" id="test-phase">idle</span>
          <div id="test-meta"></div>
        </div>
      </div>

      <div class="card">
        <h2>Network</h2>
        <div id="wifi-list" class="wifi-list"></div>
      </div>
    </div>
  </main>

  <footer>
    <span>Solaris FZ-500 · FUZE Biotech</span>
    <span id="footer-time">--</span>
  </footer>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
